<script>
const aboutStrings = {
  lt: {
    eyebrow:'tapytoja · Roterdamas', title:'Apie menininkę',
    bio:`<p>Ana Lima yra tapytoja, gyvenanti ir dirbanti Roterdame. Jos darbai atskleidžia ryškų spalvų pasaulį – ekspresyvius peizažus, figūras ir natūrmortus, kuriuose aliejus ir akrilas susilieja su intuityvia gestika.</p><p>Studijavo dailę Vilniaus dailės akademijoje, vėliau tęsė studijas Roterdame. Jos paveikslai eksponuoti galerijose Lietuvoje ir Nyderlanduose.</p><p>Priima užsakymus. Paveikslai pristatomi tarptautiniu mastu.</p>`,
    born:'Gimė', based:'Gyvena', basedVal:'Roterdamas, Nyderlandai',
    edu:'Išsilavinimas', med:'Technikos', medVal:'Aliejus, akrilas, akvarelė',
  },
  en: {
    eyebrow:'painter · Rotterdam', title:'About the artist',
    bio:`<p>Ana Lima is a painter living and working in Rotterdam. Her work explores a world of bold colour — expressive landscapes, figures and still lifes where oil and acrylic merge with intuitive mark-making.</p><p>She studied fine art at the Vilnius Academy of Arts before continuing her studies in Rotterdam. Her paintings have been exhibited in galleries in Lithuania and the Netherlands.</p><p>Commissions are welcome. Works ship internationally.</p>`,
    born:'Born', based:'Based', basedVal:'Rotterdam, Netherlands',
    edu:'Education', med:'Media', medVal:'Oil, acrylic, watercolour',
  },
};

function onLangChange(l){
  const st = aboutStrings[l];
  document.getElementById('about-eyebrow').textContent = st.eyebrow;
  document.getElementById('about-title').textContent   = st.title;
  document.getElementById('about-bio').innerHTML       = st.bio;
  document.getElementById('abl-born').textContent  = st.born;
  document.getElementById('abl-based').textContent = st.based;
  document.getElementById('abv-based').textContent = st.basedVal;
  document.getElementById('abl-edu').textContent   = st.edu;
  document.getElementById('abl-med').textContent   = st.med;
  document.getElementById('abv-med').textContent   = st.medVal;
  document.title = l==='lt'
    ? 'Apie — Ana Lima, tapytoja Roterdame'
    : 'About — Ana Lima, painter in Rotterdam';
  document.querySelector('meta[name="description"]').content = l==='lt'
    ? 'Ana Lima — tapytoja, gyvenanti Roterdame. Studijavo Vilniaus dailės akademijoje.'
    : 'Ana Lima — painter based in Rotterdam. Studied at Vilnius Academy of Arts. Commissions welcome.';
}

initLang();
</script>
