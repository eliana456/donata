<script>
const aboutStrings = {

    eyebrow:'tapytoja · Vilnius', title:'Apie menininkę',
    bio:`<p>Donata Andriuškevičienė yra tapytoja, gyvenanti ir dirbanti Vilniuje. Jos darbai atskleidžia ryškų spalvų pasaulį – ekspresyvius peizažus, abstrakcijas ir natiurmortus, kuriuose aliejus ir akrilas gula intuityviais gestais.</p><p>Baigė studijas VU Komunikacijos fakultete. Jos paveikslai eksponuoti galerijose Lietuvoje.</p><p>Priima užsakymus. Paveikslai pristatomi tarptautiniu mastu.</p>`,
    born:'Gimė', based:'Gyvena', basedVal:'Vilnius, Lietuva',
    edu:'Išsilavinimas', med:'Technikos', medVal:'Aliejus, akrilas, anglis, akvarelė',
  },
  en: {
    eyebrow:'painter · Vilnius', title:'About the artist',
    bio:`<p>Donata Andriuškevičienė is a painter living and working in Vilnius. Her work explores a world of bold colour — expressive landscapes, abtractions and still lifes where oil and acrylic merge with intuitive mark-making.</p><p>She graduated from the Faculty of Communication at Vilnius University. Her paintings have been exhibited in galleries in Lithuania.</p><p>Commissions are welcome. Works ship internationally.</p>`,
    born:'Born', based:'Based', basedVal:'Vilnius, Lithuania',
    edu:'Education', med:'Media', medVal:'Oil, acrylic, charcoal, watercolour',
  },
};

function onLangChange(l){
  const st = aboutStrings[l];
  document.getElementById('about-eyebrow').textContent = st.eyebrow;
  document.getElementById('about-title').textContent   = st.title;
  document.getElementById('about-bio').innerHTML       = st.bio;
  document.getElementById('abl-born').textContent  = st.born;
  document.getElementById('abl-based').textContent = st.based;
  document.getElementById('abv-based').textContent = st.basedVal;
  document.getElementById('abl-edu').textContent   = st.edu;
  document.getElementById('abl-med').textContent   = st.med;
  document.getElementById('abv-med').textContent   = st.medVal;
  document.title = l==='lt'
    ? 'Apie — Donata Andriuškevičienė, tapytoja Vilniuje'
    : 'About — Donata Andriuškevičienė, painter in Vilnius';
  document.querySelector('meta[name="description"]').content = l==='lt'
    ? 'Donata Andriuškevičienė — tapytoja, gyvenanti Vilniuje. Baigė studijas VU Komunikacijos fakultete'
    : 'Donata Andriuškevičienė — painter based in Vilnius. Studied at Vilnius Univeristy. Commissions welcome.';
}
